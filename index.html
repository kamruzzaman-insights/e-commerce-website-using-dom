<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e commerce website</title>

    <!-- tailwind @ daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- vanilla css  -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- header part started-->
    <header class="max-w-[1320px] mx-auto">
        <!-- nav bar part started -->
        <nav class="fixed top-0 left-0 w-full z-50">
            <div class="navbar bg-gray-200 shadow-sm">
                <div class="navbar-start">
                    <a class="btn bg-transparent border-0 shadow-none text-blue-600 font-bold text-2xl">SwiftCart</a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1">
                        <li><a
                                class="font-bold text-lg hover:bg-transparent hover:shadow-none active:bg-transparent active:text-blue-600 active:shadow-none">Home</a>
                        </li>
                        <li><a
                                id="products-btn" class="font-bold text-lg hover:bg-transparent hover:shadow-none active:bg-transparent active:text-blue-600 active:shadow-none">Products</a>
                        </li>
                        <li><a
                                class="font-bold text-lg hover:bg-transparent hover:shadow-none active:bg-transparent active:text-blue-600 active:shadow-none">About</a>
                        </li>
                        <li><a
                                class="font-bold text-lg hover:bg-transparent hover:shadow-none active:bg-transparent active:text-blue-600 active:shadow-none">Contact</a>
                        </li>
                    </ul>
                </div>
                <div class="navbar-end">
                    <a class="btn bg-transparent hover-none border-0 text-2xl font-bold"><i
                            class="fa-solid fa-cart-plus"></i></a>
                    <div class="dropdown dropdown-end">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 p-2 shadow">
                            <li><a class="font-bold text-lg active:bg-blue-600 active:text-white">Home</a>
                            </li>
                            <li><a class="font-bold text-lg active:bg-blue-600 active:text-white">Products</a>
                            </li>
                            <li><a class="font-bold text-lg active:bg-blue-600 active:text-white">About</a>
                            </li>
                            <li><a class="font-bold text-lg active:bg-blue-600 active:text-white">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
        <!-- navbar part end  -->

        <!-- banner part -->
        <div class="pt-20 lg:px-12">
            <div class="relative w-full max-w-[100vw] overflow-hidden">
                <img src="assets/young-man-looking-shopping-bags.jpg" alt="" class="w-full h-auto lg:max-h-[110vh]">

                <div class="absolute inset-0 bg-black/30"></div>

                <div class="absolute inset-0 flex flex-col items-start justify-center text-white px-4">
                    <h1 class="text-3xl md:text-5xl font-bold mb-2">Best Collection For You</h1>
                    <p class="text-lg md:text-xl mb-2">
                        Discover the latest trends in fashion, electronics,
                        and more. Shop with <br> confidence and
                        style at SwiftCart.
                    </p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded">
                        Shop Now
                    </button>
                </div>

            </div>
        </div>
    </header>
    <!-- header part end  -->

    <!-- main part started-->
     <main>
        <!-- products category part -->
         <div id="products-category-container" class="flex flex-col gap-3 flex-wrap justify-center items-center my-12">

         </div>
         
         <!-- products part  -->
          <div id="products-container" class="grid grid-cols-3 gap-3">

          </div>
     </main>
     
     <script src="script/products-category.js"></script>
     <script src="script/products.js"></script>
</body>

</html>
